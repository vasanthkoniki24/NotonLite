services:
  postgres:
    image: postgres:16
    container_name: notion_lite_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notion_db
    ports:
      - "5432:5432"
    volumes:
      - notion_lite_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: notion_lite_backend
    environment:
      APP_NAME: Notion-Lite API
      DEBUG: "True"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notion_db
      SECRET_KEY: supersecretkeychangeit
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FRONTEND_URL: http://localhost:5173
    ports:
      - "9000:9000"
    depends_on:
      - postgres

volumes:
  notion_lite_pgdata: